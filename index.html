<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gonnie - Reserva de Barberías</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <script src="https://unpkg.com/react-is@18/umd/react-is.development.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            background-color: #080B0F; 
            color: #EEF2F7;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
        }
        /* Desplazamiento suave y limpio */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #0F1419; }
        ::-webkit-scrollbar-thumb { background: #161D25; border-radius: 2px; }
        input, select { color-scheme: dark; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        const { AreaChart, Area, XAxis, Tooltip, ResponsiveContainer } = Recharts;

        // ─── CONFIGURACIÓN DE SUPABASE ACTUAL ──────────────────────────────────
        const SUPABASE_URL = "https://fnjqzcnufkhrfzxfallj.supabase.co";
        const SUPABASE_KEY = "sb_publishable_PHk3rHljiDKOQ5ByIoME0Q_jPa2Ldd-";

        const DB_HEADERS = {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`,
          "Content-Type": "application/json",
          Prefer: "return=representation",
        };

        async function dbGet(table, query = "") {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, { headers: DB_HEADERS });
          if (!res.ok) throw new Error(await res.text());
          return res.json();
        }

        async function dbInsert(table, data) {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
            method: "POST", headers: DB_HEADERS, body: JSON.stringify(data),
          });
          if (!res.ok) throw new Error(await res.text());
          return res.json();
        }

        // ─── ESTILOS DE MARCA GONNIE ───────────────────────────────────────────
        const G = {
          brand:  "#00C896", brandD: "#009E78", brandL: "#33DFB0",
          bg:     "#080B0F", card:   "#0F1419", card2:  "#161D25",
          text:   "#EEF2F7", muted:  "#6B7A8D",
          bdr:    "rgba(255,255,255,0.06)",
          green:  "#34D399", red:    "#F87171", blue:   "#60A5FA", gold:   "#F59E0B",
        };

        // ─── COMPONENTES ATÓMICOS ─────────────────────────────────────────────
        const Av = ({ txt, size = 38, bg = "#1A2535", color = G.brand }) => (
          <div style={{ width: size, height: size, borderRadius: "50%", background: bg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: size * 0.34, fontWeight: 700, color, flexShrink: 0 }}>
            {txt}
          </div>
        );

        const Pill = ({ children, color = G.brand, bg }) => (
          <span style={{ background: bg || `${color}18`, color, fontSize: 10, fontWeight: 700, padding: "2px 9px", borderRadius: 20, letterSpacing: "0.04em", whiteSpace: "nowrap" }}>
            {children}
          </span>
        );

        const Btn = ({ children, onClick, variant = "primary", full = true, disabled = false }) => (
          <button
            disabled={disabled}
            onClick={onClick}
            style={{
              width: full ? "100%" : "auto",
              background: disabled ? G.card2 : (variant === "primary" ? G.brand : "transparent"),
              color: disabled ? G.muted : (variant === "primary" ? "#080B0F" : G.text),
              border: variant === "secondary" ? `1px solid ${G.bdr}` : "none",
              padding: "11px 16px",
              borderRadius: 12,
              fontSize: 13,
              fontWeight: 700,
              cursor: disabled ? "not-allowed" : "pointer",
              transition: "all 0.15s ease",
              fontFamily: "inherit"
            }}
          >
            {children}
          </button>
        );

        // ─── VISTAS DE LA APP (CLIENTE) ───────────────────────────────────────
        function HomeScreen({ nav }) {
          const [barberias, setBarberias] = useState([]);
          const [loading, setLoading] = useState(true);

          useEffect(() => {
            dbGet("barberias", "?limit=3").then(data => {
              setBarberias(data);
              setLoading(false);
            }).catch(() => setLoading(false));
          }, []);

          return (
            <div style={{ padding: 20, paddingBottom: 80 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
                <div>
                  <p style={{ color: G.muted, fontSize: 12, margin: 0 }}>Encuentra tu estilo</p>
                  <h1 style={{ fontSize: 24, fontWeight: 800, color: G.text, margin: 0 }}>Gonnie Barber</h1>
                </div>
                <Av txt="GP" />
              </div>

              <div style={{ background: `linear-gradient(135deg, ${G.brandD} 0%, #052e16 100%)`, padding: 20, borderRadius: 16, marginBottom: 24 }}>
                <h3 style={{ color: "#fff", fontSize: 16, fontWeight: 700, marginBottom: 4 }}>¿Hora de un corte?</h3>
                <p style={{ color: "rgba(255,255,255,0.75)", fontSize: 12, marginBottom: 14 }}>Reserva citas en las barberías más top de tu ciudad de forma inmediata.</p>
                <button onClick={() => nav("explore")} style={{ background: "#fff", color: "#000", border: "none", padding: "7px 16px", borderRadius: 20, fontSize: 11, fontWeight: 700, cursor: "pointer" }}>Explorar Barberías</button>
              </div>

              <h2 style={{ fontSize: 15, fontWeight: 700, marginBottom: 12 }}>Barberías Recomendadas</h2>
              {loading ? <p style={{ color: G.muted, fontSize: 12 }}>Buscando en la base de datos...</p> : (
                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  {barberias.map(b => (
                    <div key={b.id} style={{ background: G.card, border: `0.5px solid ${G.bdr}`, borderRadius: 14, padding: 12, display: "flex", gap: 12 }}>
                      <div style={{ width: 60, height: 60, background: G.card2, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24 }}>💈</div>
                      <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center" }}>
                        <h4 style={{ fontSize: 14, fontWeight: 700, margin: 0 }}>{b.name}</h4>
                        <p style={{ fontSize: 11, color: G.muted, margin: "2px 0 4px" }}>{b.city}</p>
                        <div style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{ color: G.gold }}>★</span> <span style={{ fontSize: 11, fontWeight: 600 }}>{b.rating}</span></div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        }

        function ExploreScreen({ nav, setBarberia }) {
          const [list, setList] = useState([]);
          const tags = ["Todos", "Fade", "Barba", "Navaja", "Clásico"];
          const [filter, setFilter] = useState("Todos");

          useEffect(() => {
            dbGet("barberias").then(setList).catch(console.error);
          }, []);

          return (
            <div style={{ padding: 20, paddingBottom: 80 }}>
              <h1 style={{ fontSize: 20, fontWeight: 800, marginBottom: 14 }}>Explorar locales</h1>
              
              <div style={{ display: "flex", gap: 8, overflowX: "auto", marginBottom: 18, paddingBottom: 6 }}>
                {tags.map(t => (
                  <button key={t} onClick={() => setFilter(t)} style={{ flexShrink: 0, background: filter === t ? G.brand : G.card, color: filter === t ? "#080B0F" : G.muted, border: `0.5px solid ${G.bdr}`, borderRadius: 20, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontWeight: filter === t ? 700 : 400 }}>{t}</button>
                ))}
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {list.map(b => (
                  <div key={b.id} onClick={() => { setBarberia(b); nav("detail"); }} style={{ background: G.card, border: `0.5px solid ${G.bdr}`, borderRadius: 14, padding: 14, cursor: "pointer" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start", marginBottom: 4 }}>
                      <h3 style={{ fontSize: 14, fontWeight: 700, margin: 0 }}>{b.name}</h3>
                      <div style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{ color: G.gold }}>★</span> <span style={{ fontSize: 11, fontWeight: 600 }}>{b.rating}</span></div>
                    </div>
                    <p style={{ fontSize: 12, color: G.muted, margin: "0 0 10px" }}>{b.city} • {b.hours}</p>
                    <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                      {b.specialties?.map(s => <Pill key={s} color={G.blue}>{s}</Pill>)}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        }

        function DetailScreen({ barberia, nav, setBooking }) {
          const [tab, setTab] = useState("barberos");
          const [barberos, setBarberos] = useState([]);
          const [servicios, setServicios] = useState([]);

          useEffect(() => {
            if (barberia?.id) {
              dbGet("barberos", `?barberia_id=eq.${barberia.id}`).then(setBarberos);
              dbGet("servicios", `?barberia_id=eq.${barberia.id}`).then(setServicios);
            }
          }, [barberia]);

          return (
            <div style={{ padding: 20, paddingBottom: 80 }}>
              <button onClick={() => nav("explore")} style={{ background: "transparent", border: "none", color: G.brand, fontSize: 12, fontWeight: 700, cursor: "pointer", marginBottom: 14 }}>← Volver</button>
              
              <h1 style={{ fontSize: 22, fontWeight: 800, margin: "0 0 4px" }}>{barberia.name}</h1>
              <p style={{ fontSize: 12, color: G.muted, marginBottom: 18 }}>{barberia.city} • {barberia.hours}</p>

              <div style={{ display: "flex", background: G.card2, borderRadius: 10, padding: 3, marginBottom: 16 }}>
                {[{id:"barberos", l:"Barberos"}, {id:"servicios", l:"Servicios"}].map(t => (
                  <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, background: tab === t.id ? G.brand : "transparent", color: tab === t.id ? "#080B0F" : G.muted, border: "none", borderRadius: 8, padding: "7px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>{t.l}</button>
                ))}
              </div>

              {tab === "barberos" && (
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {barberos.map(bar => (
                    <div key={bar.id} style={{ background: G.card, border: `0.5px solid ${G.bdr}`, borderRadius: 12, padding: 12, display: "flex", alignItems: "center", justifyContent: "between" }} className="justify-between">
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <Av txt={bar.initials || "B"} />
                        <div>
                          <h4 style={{ fontSize: 13, fontWeight: 700, margin: 0 }}>{bar.name}</h4>
                          <p style={{ fontSize: 11, color: G.muted, margin: 0 }}>{bar.role || 'Estilista Profesional'}</p>
                        </div>
                      </div>
                      <button onClick={() => { setBooking({ barberia, bar }); nav("booking"); }} style={{ background: `${G.brand}15`, color: G.brand, border: "none", padding: "6px 12px", borderRadius: 8, fontSize: 11, fontWeight: 700, cursor: "pointer" }}>Reservar</button>
                    </div>
                  ))}
                </div>
              )}

              {tab === "servicios" && (
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {servicios.map(ser => (
                    <div key={ser.id} style={{ background: G.card, border: `0.5px solid ${G.bdr}`, borderRadius: 12, padding: 12, display: "flex", alignItems: "center", justifyContent: "between" }} className="justify-between">
                      <div>
                        <h4 style={{ fontSize: 13, fontWeight: 700, margin: 0 }}>{ser.icon || '✂️'} {ser.name}</h4>
                        <p style={{ fontSize: 11, color: G.muted, margin: "2px 0 0" }}>{ser.duration_min} minutos</p>
                      </div>
                      <span style={{ fontSize: 13, fontWeight: 700, color: G.brand }}>{ser.price}€</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        }

        function BookingScreen({ booking, nav, setConfirmedAppt }) {
          const [date, setDate] = useState("");
          const [time, setTime] = useState("");

          const handleConfirm = async () => {
            if (!date || !time) return alert("Por favor selecciona fecha y hora");
            setConfirmedAppt({ ...booking, date, time });
            nav("confirmed");
          };

          return (
            <div style={{ padding: 20 }}>
              <h1 style={{ fontSize: 18, fontWeight: 800, marginBottom: 4 }}>Agendar Cita</h1>
              <p style={{ fontSize: 12, color: G.muted, marginBottom: 20 }}>Con {booking.bar.name} en {booking.barberia.name}</p>

              <div style={{ display: "flex", flexDirection: "column", gap: 14, marginBottom: 24 }}>
                <div>
                  <label style={{ fontSize: 11, fontWeight: 700, color: G.muted, display: "block", marginBottom: 6 }}>SELECCIONA FECHA</label>
                  <input type="date" value={date} onChange={e => setDate(e.target.value)} style={{ width: "100%", background: G.card, border: `1px solid ${G.bdr}`, padding: 12, borderRadius: 10, color: G.text }} />
                </div>
                <div>
                  <label style={{ fontSize: 11, fontWeight: 700, color: G.muted, display: "block", marginBottom: 6 }}>SELECCIONA HORA</label>
                  <input type="time" value={time} onChange={e => setTime(e.target.value)} style={{ width: "100%", background: G.card, border: `1px solid ${G.bdr}`, padding: 12, borderRadius: 10, color: G.text }} />
                </div>
              </div>

              <Btn onClick={handleConfirm}>Confirmar Reserva</Btn>
            </div>
          );
        }

        function ConfirmedScreen({ nav, appt }) {
          return (
            <div style={{ padding: 20, textAlign: "center", paddingTop: 60 }}>
              <div style={{ fontSize: 48, marginBottom: 14 }}>✅</div>
              <h1 style={{ fontSize: 20, fontWeight: 800, marginBottom: 6 }}>¡Cita Confirmada!</h1>
              <p style={{ fontSize: 12, color: G.muted, maxWidth: 260, margin: "0 auto 24px" }}>Tu reserva con {appt?.bar?.name} se completó con éxito para el día {appt?.date} a las {appt?.time}.</p>
              <Btn onClick={() => nav("home")}>Regresar al Inicio</Btn>
            </div>
          );
        }

        // ─── COMPONENTE GLOBAL (Enrutador de Navegación Móvil) ─────────────────
        function GonnieApp() {
          const [view, setView] = useState("home");
          const [barberia, setBarberia] = useState(null);
          const [booking, setBooking] = useState(null);
          const [confirmedAppt, setConfirmedAppt] = useState(null);

          const NAV_ITEMS = [
            { id: "home", label: "Inicio", icon: "🏠" },
            { id: "explore", label: "Explorar", icon: "🔍" }
          ];

          return (
            <div className="flex justify-center bg-black min-h-screen">
              <div style={{ width: "100%", maxWidth: 420, background: G.bg, minHeight: "100vh", position: "relative", display: "flex", flexDirection: "column" }}>
                
                {/* Contenedor dinámico de pantallas */}
                <div style={{ flex: 1, overflowY: "auto" }}>
                  {view === "home" && <HomeScreen nav={setView} />}
                  {view === "explore" && <ExploreScreen nav={setView} setBarberia={setBarberia} />}
                  {view === "detail" && <DetailScreen barberia={barberia} nav={setView} setBooking={setBooking} />}
                  {view === "booking" && <BookingScreen booking={booking} nav={setView} setConfirmedAppt={setConfirmedAppt} />}
                  {view === "confirmed" && <ConfirmedScreen nav={setView} appt={confirmedAppt} />}
                </div>

                {/* Barra inferior de navegación fija */}
                {view !== "confirmed" && (
                  <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: 64, background: G.card, borderTop: `0.5px solid ${G.bdr}`, display: "flex", alignItems: "center" }}>
                    {NAV_ITEMS.map(n => (
                      <button key={n.id} onClick={() => setView(n.id)} style={{ flex: 1, background: "transparent", border: "none", color: view === n.id ? G.brand : G.muted, fontSize: 11, fontWeight: 600, cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                        <span style={{ fontSize: 18 }}>{n.icon}</span> {n.label}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GonnieApp />);
    </script>
</body>
</html>
