<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gonnie App - Supabase Edition</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <script src="https://unpkg.com/react-is@18/umd/react-is.development.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        body { 
            background-color: #06080B; 
            color: #EEF2F7;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #0F1419; }
        ::-webkit-scrollbar-thumb { background: #161D25; border-radius: 2px; }
        input, select, textarea { color-scheme: dark; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        const { AreaChart, Area, XAxis, Tooltip, ResponsiveContainer } = Recharts;

        // ─── CONFIGURACIÓN DE SUPABASE ──────────────────────────────────────────
        const SUPABASE_URL = "https://fnjqzcnufkhrfzxfallj.supabase.co";
        const SUPABASE_KEY = "sb_publishable_PHk3rHljiDKOQ5ByIoME0Q_jPa2Ldd-";

        const DB_HEADERS = {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`,
          "Content-Type": "application/json",
          Prefer: "return=representation",
        };

        async function dbGet(table, query = "") {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, { headers: DB_HEADERS });
          if (!res.ok) throw new Error(await res.text());
          return res.json();
        }

        async function dbInsert(table, data) {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
            method: "POST", headers: DB_HEADERS, body: JSON.stringify(data),
          });
          if (!res.ok) throw new Error(await res.text());
          return res.json();
        }

        // ─── SUPABASE AUTH CLIENT ───────────────────────────────────────────────
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function signInWithGoogle() {
          await supabaseClient.auth.signInWithOAuth({
            provider: "google",
            options: { redirectTo: "https://www.gonnie.app" }
          });
        }

        async function signOut() {
          await supabaseClient.auth.signOut();
        }

        // ─── EMAIL DE CONFIRMACIÓN VÍA SUPABASE EDGE FUNCTION ──────────────────
        async function sendConfirmationEmail({ barberia, barbero, servicio, fecha, hora, precio, cliente, email_cliente }) {
          try {
            await fetch(`${SUPABASE_URL}/functions/v1/rapid-processor`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${SUPABASE_KEY}`,
              },
              body: JSON.stringify({ barberia, barbero, servicio, fecha, hora, precio, cliente, email_cliente }),
            });
          } catch (e) {
            console.warn("Email no enviado:", e.message);
          }
        }

        // ─── PALETA DE COLORES GONNIE ──────────────────────────────────────────
        const G = {
          brand: "#00C896", brandD: "#009E78", brandL: "#33DFB0",
          bg: "#080B0F", card: "#0F1419", card2: "#161D25",
          text: "#EEF2F7", muted: "#6B7A8D",
          bdr: "rgba(255,255,255,0.06)",
          green: "#34D399", red: "#F87171", blue: "#60A5FA", gold: "#F59E0B",
        };


        // ─── HELPER: NIVELES DE PUNTOS ────────────────────────────────────────
        function getNivel(puntos) {
          if (puntos >= 1500) return { nombre: "Platino", icono: "💎", color: "#60A5FA", min: 1500, max: 2000 };
          if (puntos >= 1000) return { nombre: "Oro",     icono: "🏆", color: "#F59E0B", min: 1000, max: 1500 };
          if (puntos >= 500)  return { nombre: "Plata",   icono: "🥈", color: "#9CA3AF", min: 500,  max: 1000 };
          return                     { nombre: "Bronce",  icono: "🥉", color: "#CD7F32", min: 0,    max: 500  };
        }

        function getProgreso(puntos) {
          const nivel = getNivel(puntos);
          if (nivel.nombre === "Platino") return 100;
          return Math.min(((puntos - nivel.min) / (nivel.max - nivel.min)) * 100, 100);
        }

        function getPtsParaSiguiente(puntos) {
          const nivel = getNivel(puntos);
          if (nivel.nombre === "Platino") return 0;
          return nivel.max - puntos;
        }

        const BARBER_COLORS = [
          { bg: "#1A2535", color: G.blue },
          { bg: "#1A2520", color: G.green },
          { bg: "#251A25", color: "#C084FC" },
          { bg: "#2A1A1A", color: "#FB923C" },
        ];

        // ─── COMPONENTES AUXILIARES DE UI ───────────────────────────────────────
        const Av = ({ txt, size = 38, bg = "#1A2535", color = G.brand }) => (
          <div style={{ width: size, height: size, borderRadius: "50%", background: bg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: size * 0.34, fontWeight: 700, color, flexShrink: 0 }}>{txt}</div>
        );

        const Pill = ({ children, color = G.brand, bg }) => (
          <span style={{ background: bg || `${color}18`, color, fontSize: 10, fontWeight: 700, padding: "2px 9px", borderRadius: 20, letterSpacing: "0.04em", whiteSpace: "nowrap" }}>{children}</span>
        );

        const NewPill = () => <Pill color="#080B0F" bg={G.brand}>NUEVO</Pill>;

        const PrimaryBtn = ({ onClick, children, disabled, style = {} }) => (
          <button onClick={disabled ? undefined : onClick} style={{ background: disabled ? `${G.brand}40` : G.brand, color: disabled ? "rgba(255,255,255,0.3)" : "#080B0F", border: "none", borderRadius: 14, padding: "13px 20px", fontSize: 14, fontWeight: 800, cursor: disabled ? "not-allowed" : "pointer", width: "100%", fontFamily: "inherit", ...style }}>
            {children}
          </button>
        );

        const GhostBtn = ({ onClick, children }) => (
          <button onClick={onClick} style={{ background: "transparent", border: `0.5px solid ${G.bdr}`, borderRadius: 14, padding: "12px 20px", fontSize: 13, fontWeight: 500, cursor: "pointer", width: "100%", fontFamily: "inherit", color: G.muted }}>
            {children}
          </button>
        );

        const Back = ({ onBack }) => (
          <button onClick={onBack} style={{ background: `${G.brand}15`, border: "none", borderRadius: 10, padding: "6px 12px", fontSize: 12, color: G.brand, cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }}>
            ← Volver
          </button>
        );

        const SLabel = ({ children }) => (
          <p style={{ fontSize: 10, color: G.muted, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 10 }}>{children}</p>
        );

        const Skeleton = ({ h = 60, r = 14 }) => (
          <div style={{ height: h, borderRadius: r, background: G.card, border: `0.5px solid ${G.bdr}`, marginBottom: 12, opacity: 0.6 }} />
        );

        const GonnieLogo = ({ size = 26 }) => (
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: size, height: size, borderRadius: size * 0.3, background: G.brand, display: "flex", alignItems: "center", justifyContent: "center", fontSize: size * 0.55 }}>✂</div>
            <span style={{ fontSize: size * 0.75, fontWeight: 900, color: G.text, letterSpacing: "-0.02em" }}>gonnie</span>
          </div>
        );

        // ─── VISTA LOGIN: ACCESO CON GOOGLE ───────────────────────────────────
        function LoginScreen() {
          const [loading, setLoading] = useState(false);
          return (
            <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "32px 28px", background: G.bg }}>
              <div style={{ textAlign: "center", marginBottom: 40 }}>
                <div style={{ width: 88, height: 88, borderRadius: 28, background: G.brand, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 42, marginBottom: 20, marginLeft: "auto", marginRight: "auto" }}>✂</div>
                <h1 style={{ fontSize: 42, fontWeight: 900, color: G.text, letterSpacing: "-0.04em", marginBottom: 6 }}>gonnie</h1>
                <p style={{ fontSize: 14, color: G.muted }}>Tu barbería, en tu bolsillo</p>
              </div>

              <div style={{ width: "100%", marginBottom: 32 }}>
                {[
                  { icon: "⚡", label: "Reserva en menos de 30 segundos" },
                  { icon: "🏆", label: "Acumula puntos con cada visita" },
                  { icon: "🤖", label: "Tu barbero ideal sugerido por IA" },
                ].map((f, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 14, padding: "12px 0", borderBottom: i < 2 ? `0.5px solid ${G.bdr}` : "none" }}>
                    <div style={{ width: 38, height: 38, borderRadius: 11, background: `${G.brand}15`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>{f.icon}</div>
                    <p style={{ fontSize: 13, color: G.text, fontWeight: 500 }}>{f.label}</p>
                  </div>
                ))}
              </div>

              <div style={{ width: "100%" }}>
                <button
                  onClick={async () => { setLoading(true); await signInWithGoogle(); }}
                  disabled={loading}
                  style={{ width: "100%", background: "white", color: "#1a1a1a", border: "none", borderRadius: 14, padding: "14px 20px", fontSize: 15, fontWeight: 700, cursor: loading ? "not-allowed" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 12, marginBottom: 14, opacity: loading ? 0.7 : 1 }}>
                  <svg width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 33.6 29.3 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l5.7-5.7C34.3 5.1 29.4 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.5 0 20-7.8 20-21 0-1.3-.2-2.7-.4-4z"/>
                    <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.1 8.1 2.9l5.7-5.7C34.3 5.1 29.4 3 24 3 16.3 3 9.7 7.9 6.3 14.7z"/>
                    <path fill="#4CAF50" d="M24 45c5.2 0 10-1.9 13.7-5.1l-6.3-5.3C29.4 36.3 26.8 37 24 37c-5.2 0-9.7-3.5-11.3-8.3l-6.6 5.1C9.6 41 16.3 45 24 45z"/>
                    <path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.3-2.3 4.3-4.3 5.6l6.3 5.3C41.4 35.4 44 30.1 44 24c0-1.3-.2-2.7-.4-4z"/>
                  </svg>
                  {loading ? "Redirigiendo..." : "Continuar con Google"}
                </button>
                <p style={{ fontSize: 11, color: G.muted, textAlign: "center" }}>
                  Al continuar aceptas los términos de uso · Gratis para clientes
                </p>
              </div>
            </div>
          );
        }

        // ─── VISTA 0: SPLASH SCREEN ───────────────────────────────────────────
        function SplashScreen({ onDone }) {
          return (
            <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "32px 28px", minHeight: "80vh" }}>
              <div style={{ marginBottom: 36, textAlign: "center" }}>
                <div style={{ width: 84, height: 84, borderRadius: 26, background: G.brand, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 40, marginBottom: 18, marginLeft: "auto", marginRight: "auto" }}>✂</div>
                <h1 style={{ fontSize: 44, fontWeight: 900, color: G.text, letterSpacing: "-0.04em", marginBottom: 6 }}>gonnie</h1>
                <p style={{ fontSize: 14, color: G.muted }}>Tu barbería, en tu bolsillo</p>
              </div>
              <div style={{ width: "100%", marginBottom: 28 }}>
                {[
                  { icon: "⚡", label: "Reserva en menos de 30 segundos" },
                  { icon: "🏆", label: "Acumula puntos con cada visita" },
                  { icon: "🤖", label: "Tu barbero ideal sugerido por IA" },
                ].map((f, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 14, padding: "12px 0", borderBottom: i < 2 ? `0.5px solid ${G.bdr}` : "none" }}>
                    <div style={{ width: 38, height: 38, borderRadius: 11, background: `${G.brand}15`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>{f.icon}</div>
                    <p style={{ fontSize: 13, color: G.text, fontWeight: 500 }}>{f.label}</p>
                  </div>
                ))}
              </div>
              <div style={{ width: "100%", display: "flex", flexDirection: "column", gap: 10 }}>
                <PrimaryBtn onClick={onDone}>Empezar →</PrimaryBtn>
                <p style={{ fontSize: 11, color: G.muted, textAlign: "center" }}>Gratis para clientes · Barberías desde 29€/mes</p>
              </div>
            </div>
          );
        }

        // ─── VISTA 1: HOME SCREEN ─────────────────────────────────────────────
        function HomeScreen({ nav, user, puntos = 0 }) {
          const nivel = getNivel(puntos);
          const progreso = getProgreso(puntos);
          const ptsSiguiente = getPtsParaSiguiente(puntos);
          const nombre = user?.user_metadata?.full_name?.split(" ")[0] || "tú";
          return (
            <div style={{ flex: 1, overflowY: "auto", paddingBottom: 80 }}>
              <div style={{ padding: "16px 18px 12px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div><GonnieLogo /><p style={{ fontSize: 11, color: G.muted, marginTop: 4 }}>Buenas 👋 {nombre}</p></div>
                <div style={{ position: "relative" }}>
                  <div style={{ width: 38, height: 38, borderRadius: "50%", background: G.card, border: `0.5px solid ${G.bdr}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>🔔</div>
                  <div style={{ position: "absolute", top: 2, right: 2, width: 9, height: 9, borderRadius: "50%", background: G.brand, border: `2px solid ${G.bg}` }} />
                </div>
              </div>

              <div style={{ padding: "0 18px" }}>
                {/* Caja de Puntos */}
                <div onClick={() => nav("loyalty")} style={{ background: "linear-gradient(135deg,#091A14,#0A1F18)", border: `1px solid ${G.brand}30`, borderRadius: 20, padding: "18px 20px", marginBottom: 16, cursor: "pointer", position: "relative" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14 }}>
                    <div>
                      <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 4 }}>
                        <p style={{ fontSize: 10, color: `${G.brand}90`, letterSpacing: "0.08em", textTransform: "uppercase" }}>Gonnie Points</p>
                        <NewPill />
                      </div>
                      <p style={{ fontSize: 38, fontWeight: 900, color: G.brand, lineHeight: 1 }}>{puntos.toLocaleString("es-ES")}</p>
                      <p style={{ fontSize: 11, color: G.muted, marginTop: 4 }}>
                        Nivel {nivel.nombre} · {ptsSiguiente > 0 ? `${ptsSiguiente} pts para ${getNivel(puntos + ptsSiguiente).nombre}` : "¡Nivel máximo! 🎉"}
                      </p>
                    </div>
                    <div style={{ background: `${G.brand}15`, border: `0.5px solid ${G.brand}30`, borderRadius: 14, padding: "10px 12px", textAlign: "center" }}>
                      <p style={{ fontSize: 22, marginBottom: 2 }}>{nivel.icono}</p>
                      <p style={{ fontSize: 9, fontWeight: 800, color: nivel.color }}>{nivel.nombre.toUpperCase()}</p>
                    </div>
                  </div>
                  <div style={{ background: "rgba(255,255,255,0.06)", borderRadius: 8, height: 5, overflow: "hidden" }}>
                    <div style={{ width: `${progreso}%`, height: "100%", background: `linear-gradient(90deg,${G.brand},${G.brandL})`, transition: "width 0.8s ease" }} />
                  </div>
                </div>

                {/* Próxima Cita */}
                <div style={{ background: G.card, border: `0.5px solid ${G.green}30`, borderRadius: 18, padding: "14px 16px", marginBottom: 16 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                    <p style={{ fontSize: 10, color: G.muted, fontWeight: 700, textTransform: "uppercase" }}>Próxima cita</p>
                    <Pill color="#080B0F" bg={G.green}>Hoy 11:30h</Pill>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <Av txt="CM" size={42} bg="#1A2535" color={G.blue} />
                    <div style={{ flex: 1 }}>
                      <p style={{ fontSize: 15, fontWeight: 700, color: G.text }}>Corte + Barba</p>
                      <p style={{ fontSize: 12, color: G.muted }}>Carlos M. · BarberKing</p>
                    </div>
                    <button onClick={() => nav("confirmed")} style={{ background: `${G.brand}15`, border: `0.5px solid ${G.brand}40`, borderRadius: 10, padding: "8px 12px", fontSize: 11, color: G.brand, fontWeight: 700 }}>📱 QR</button>
                  </div>
                </div>

                {/* Botones de acción */}
                <SLabel>Acciones rápidas</SLabel>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 18 }}>
                  {[
                    { icon: "✂️", label: "Reservar cita", action: () => nav("explore") },
                    { icon: "👥", label: "Reserva grupal", action: () => nav("explore"), isNew: true },
                    { icon: "💬", label: "Chat barbería", action: () => alert("Módulo de chat próximamente disponible"), isNew: true },
                  ].map((a, i) => (
                    <div key={i} onClick={a.action} style={{ background: G.card, border: `0.5px solid ${G.bdr}`, borderRadius: 16, padding: "14px 14px 12px", cursor: "pointer", position: "relative" }}>
                      {a.isNew && <div style={{ position: "absolute", top: 10, right: 10 }}><NewPill /></div>}
                      <span style={{ fontSize: 26, display: "block", marginBottom: 8 }}>{a.icon}</span>
                      <span style={{ fontSize: 12, fontWeight: 600, color: G.text }}>{a.label}</span>
                    </div>
                  ))}
                </div>

               
          );
        }

        // ─── VISTA 2: EXPLORAR BARBERÍAS (REAL DESDE SUPABASE) ────────────────
        function ExploreScreen({ nav, setBarberia }) {
          const [barberias, setBarberias] = useState([]);
          const [loading, setLoading] = useState(true);
          const [error, setError] = useState(null);
          const [q, setQ] = useState("");
          const [filter, setFilter] = useState("Todos");
          const tags = ["Todos", "Fade", "Barba", "Navaja", "Clásico"];

          useEffect(() => {
            dbGet("barberias", "?select=*&order=rating.desc")
              .then(data => { setBarberias(Array.isArray(data) ? data : []); setLoading(false); })
              .catch(e => { setError(e.message); setLoading(false); });
          }, []);

          const list = barberias.filter(b =>
            (filter === "Todos" || (b.specialties || []).includes(filter)) &&
            b.name.toLowerCase().includes(q.toLowerCase())
          );

          return (
            <div style={{ flex: 1, overflowY: "auto", padding: "16px 18px", paddingBottom: 80 }}>
              <h2 style={{ fontSize: 22, fontWeight: 900, color: G.text, marginBottom: 14 }}>Explorar locales</h2>

              <div style={{ background: G.card, border: `0.5px solid ${G.bdr}`, borderRadius: 14, padding: "10px 14px", display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
                <span style={{ color: G.muted }}>🔍</span>
                <input value={q} onChange={e => setQ(e.target.value)} placeholder="Buscar barberías..." style={{ background: "transparent", border: "none", outline: "none", color: G.text, fontSize: 13, flex: 1 }} />
              </div>

              <div style={{ display: "flex", gap: 8, overflowX: "auto", marginBottom: 18, paddingBottom: 4 }}>
                {tags.map(t => (
                  <button key={t} onClick={() => setFilter(t)} style={{ flexShrink: 0, background: filter === t ? G.brand : G.card, color: filter === t ? "#080B0F" : G.muted, border: `0.5px solid ${filter === t ? "transparent" : G.bdr}`, borderRadius: 20, padding: "6px 16px", fontSize: 12, fontWeight: filter === t ? 800 : 400, cursor: "pointer" }}>{t}</button>
                ))}
              </div>

              {loading && [1, 2, 3].map(i => <Skeleton key={i} h={140} />)}

              {!loading && list.map((b) => (
                <div key={b.id} onClick={() => { setBarberia(b); nav("detail"); }} style={{ background: G.card, border: `0.5px solid ${G.bdr}`, borderRadius: 18, marginBottom: 12, overflow: "hidden", cursor: "pointer" }}>
                  <div style={{ height: 90, background: `linear-gradient(135deg,#0D1A15,#111F1A)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 36, position: "relative" }}>
                    💈
                    <div style={{ position: "absolute", top: 10, right: 10 }}>
                      <Pill color={b.is_open ? "#080B0F" : G.red} bg={b.is_open ? G.green : `${G.red}18`}>{b.is_open ? "Abierto" : "Cerrado"}</Pill>
                    </div>
                  </div>
                  <div style={{ padding: "12px 14px 14px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                      <p style={{ fontSize: 15, fontWeight: 800, color: G.text }}>{b.name}</p>
                      <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                        <span style={{ fontSize: 11 }}>⭐</span>
                        <span style={{ fontSize: 13, fontWeight: 700 }}>{b.rating}</span>
                      </div>
                    </div>
                    <p style={{ fontSize: 11, color: G.muted, marginBottom: 8 }}>📍 {b.city} · {b.hours}</p>
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                      {(b.specialties || []).map(sp => <Pill key={sp}>{sp}</Pill>)}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          );
        }

        // ─── VISTA 3: DETALLE DE LOCAL (BARBEROS Y SERVICIOS) ──────────────────
        function DetailScreen({ barberia, nav, setBooking }) {
          const [tab, setTab] = useState("barberos");
          const [barberos, setBarberos] = useState([]);
          const [servicios, setServicios] = useState([]);
          const [loading, setLoading] = useState(true);
          const [selB, setSelB] = useState(null);
          const [selS, setSelS] = useState(null);

          useEffect(() => {
            if (!barberia?.id) return;
            setLoading(true);
            Promise.all([
              dbGet("barberos", `?barberia_id=eq.${barberia.id}&select=*`),
              dbGet("servicios", `?barberia_id=eq.${barberia.id}&select=*`)
            ]).then(([brs, svs]) => {
              setBarberos(brs); setServicios(svs); setLoading(false);
            }).catch(() => setLoading(false));
          }, [barberia]);

          return (
            <div style={{ flex: 1, overflowY: "auto", paddingBottom: 100 }}>
              <div style={{ height: 100, background: "linear-gradient(135deg,#0D1A15,#111F1A)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 44, position: "relative" }}>
                💈
                <div style={{ position: "absolute", top: 14, left: 14 }}><Back onBack={() => nav("explore")} /></div>
              </div>

              <div style={{ padding: "16px 18px" }}>
                <h2 style={{ fontSize: 20, fontWeight: 800, margin: 0 }}>{barberia.name}</h2>
                <p style={{ fontSize: 12, color: G.muted, marginBottom: 14 }}>📍 {barberia.city} • {barberia.hours}</p>

                <div style={{ display: "flex", background: G.card2, borderRadius: 12, padding: 3, marginBottom: 18 }}>
                  {[{ id: "barberos", l: "Barberos" }, { id: "servicios", l: "Servicios" }].map(t => (
                    <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, background: tab === t.id ? G.brand : "transparent", color: tab === t.id ? "#080B0F" : G.muted, border: "none", borderRadius: 10, padding: "8px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>{t.l}</button>
                  ))}
                </div>

                {loading && <Skeleton h={80} />}

                {tab === "barberos" && !loading && barberos.map((br, idx) => (
                  <div key={br.id} onClick={() => setSelB(br)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", background: selB?.id === br.id ? `${G.brand}10` : G.card, border: `0.5px solid ${selB?.id === br.id ? G.brand : G.bdr}`, borderRadius: 14, marginBottom: 10, cursor: "pointer" }}>
                    <Av txt={br.initials || "B"} bg={BARBER_COLORS[idx % 4].bg} color={BARBER_COLORS[idx % 4].color} />
                    <div style={{ flex: 1 }}><p style={{ fontSize: 14, fontWeight: 700, margin: 0 }}>{br.name}</p><p style={{ fontSize: 11, color: G.muted, margin: 0 }}>{br.role}</p></div>
                    <p style={{ fontSize: 12, color: G.gold, fontWeight: 700 }}>⭐ {br.rating}</p>
                  </div>
                ))}

                {tab === "servicios" && !loading && servicios.map(sv => (
                  <div key={sv.id} onClick={() => setSelS(sv)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", background: selS?.id === sv.id ? `${G.brand}10` : G.card, border: `0.5px solid ${selS?.id === sv.id ? G.brand : G.bdr}`, borderRadius: 14, marginBottom: 10, cursor: "pointer" }}>
                    <span style={{ fontSize: 20 }}>{sv.icon || "✂️"}</span>
                    <div style={{ flex: 1 }}><p style={{ fontSize: 14, fontWeight: 600, margin: 0 }}>{sv.name}</p><p style={{ fontSize: 11, color: G.muted, margin: 0 }}>⏱ {sv.duration_min} min</p></div>
                    <p style={{ fontSize: 16, fontWeight: 800 }}>{sv.price}€</p>
                  </div>
                ))}

                <div style={{ marginTop: 20 }}>
                  <PrimaryBtn disabled={!selB || !selS} onClick={() => { setBooking({ barberia, bar: selB, svc: selS }); nav("booking"); }}>Proceder a la Reserva →</PrimaryBtn>
                </div>
              </div>
            </div>
          );
        }

        // ─── VISTA 4: AGENDA Y TURNOS (BOOKING SCREEN) ────────────────────────
        function BookingScreen({ booking, nav, setConfirmedAppt, setPuntos, user }) {
          const [date, setDate] = useState("");
          const [slot, setSlot] = useState("");
          const [saving, setSaving] = useState(false);
          const slots = ["09:00", "09:40", "10:20", "11:00", "11:40", "16:00", "16:40", "17:20"];

          const confirm = async () => {
            if (!date || !slot) return alert("Selecciona fecha y hora");
            setSaving(true);
            try {
             const payload = {
  barberia_id: booking.barberia.id,
  barbero_id: booking.bar.id,
  servicio_id: booking.svc.id,
  client_name: user?.user_metadata?.full_name || "Cliente",
  client_email: user?.email || "",
  date,
  time: slot,
  price: booking.svc.price,
  points_earned: Math.floor(booking.svc.price * 2)
};
             
              await dbInsert("appointments", payload);
              setConfirmedAppt(payload);
              // Enviar emails de confirmación
              await sendConfirmationEmail({
                barberia: booking.barberia?.name || "GonnieBarbershop",
                barbero: booking.bar?.name || "Barbero",
                servicio: booking.svc?.name || "Servicio",
                fecha: date,
                hora: slot,
                precio: booking.svc?.price || 0,
                cliente: user?.user_metadata?.full_name || user?.email || "Cliente",
                email_cliente: user?.email || "",
              });
              setPuntos(prev => prev + Math.floor((booking.svc?.price || 0) * 2));
              nav("confirmed");
            } catch (e) {
              // Si falla la tabla simulada, igual avanza para experiencia fluida
              setConfirmedAppt({ ...booking, date, time: slot, price: booking.svc.price });
              nav("confirmed");
            } finally { setSaving(false); }
          };

          return (
            <div style={{ flex: 1, padding: 18 }}>
              <Back onBack={() => nav("detail")} />
              <h3 style={{ fontSize: 18, fontWeight: 800, marginTop: 14 }}>Programar Horario</h3>
              <p style={{ fontSize: 12, color: G.muted }}>{booking.svc.name} con {booking.bar.name}</p>

              <input type="date" value={date} onChange={e => setDate(e.target.value)} style={{ width: "100%", background: G.card, border: `1px solid ${G.bdr}`, padding: 12, borderRadius: 12, color: G.text, marginTop: 14, marginBottom: 18 }} />

              <SLabel>Horarios Disponibles</SLabel>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 24 }}>
                {slots.map(s => (
                  <button key={s} onClick={() => setSlot(s)} style={{ background: slot === s ? G.brand : G.card, color: slot === s ? "#000" : G.text, border: `1px solid ${G.bdr}`, padding: 10, borderRadius: 10, fontWeight: 700, cursor: "pointer" }}>{s}</button>
                ))}
              </div>

              <PrimaryBtn disabled={saving || !date || !slot} onClick={confirm}>{saving ? "Procesando..." : "Confirmar Reserva"}</PrimaryBtn>
            </div>
          );
        }

        // ─── VISTA 5: CITAS CONFIRMADAS Y QR GENERATOR ────────────────────────
        function ConfirmedScreen({ nav, appt }) {
          return (
            <div style={{ flex: 1, padding: 24, textAlign: "center", paddingTop: 40 }}>
              <div style={{ fontSize: 50, marginBottom: 12 }}>✅</div>
              <h2 style={{ fontSize: 22, fontWeight: 900 }}>¡Todo Listo!</h2>
              <p style={{ fontSize: 12, color: G.muted, marginBottom: 20 }}>Muestra este código QR al llegar al establecimiento</p>

              {/* QR Simulado */}
              <div style={{ background: "#FFF", padding: 16, width: 160, height: 160, marginLeft: "auto", marginRight: "auto", borderRadius: 16, display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 24 }}>
                {Array.from({ length: 64 }).map((_, i) => (
                  <div key={i} style={{ width: 14, height: 14, background: (i * 7) % 3 === 0 ? "#000" : "#FFF" }} />
                ))}
              </div>

              <div style={{ background: G.card, padding: 14, borderRadius: 12, textAlign: "left", marginBottom: 20, border: `1px solid ${G.bdr}` }}>
                <p style={{ fontSize: 13, margin: "2px 0" }}>📅 <b>Fecha:</b> {appt?.date || "Hoy"}</p>
                <p style={{ fontSize: 13, margin: "2px 0" }}>⏰ <b>Hora:</b> {appt?.time || "11:30h"}</p>
                <p style={{ fontSize: 13, margin: "2px 0" }}>💰 <b>Importe:</b> {appt?.price || 20}€</p>
              </div>

              <PrimaryBtn onClick={() => nav("home")}>Volver a Inicio</PrimaryBtn>
            </div>
          );
        }

        // ─── VISTA 6: HISTORIAL DE CITAS (APPOINTMENTS) ───────────────────────
        function AppointmentsScreen() {
          return (
            <div style={{ flex: 1, padding: 18 }}>
              <h2 style={{ fontSize: 20, fontWeight: 800, marginBottom: 14 }}>Mis Reservas</h2>
              <div style={{ background: G.card, border: `1px solid ${G.bdr}`, borderRadius: 14, padding: 14, marginBottom: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                  <p style={{ fontSize: 14, fontWeight: 700, margin: 0 }}>Corte de pelo Degradado</p>
                  <Pill bg={`${G.green}20`} color={G.green}>Completado</Pill>
                </div>
                <p style={{ fontSize: 12, color: G.muted, margin: 0 }}>💈 BarberKing • 📅 12 Mayo • 💰 15€</p>
              </div>
            </div>
          );
        }

        // ─── VISTA 7: FIDELIZACIÓN Y PREMIOS (LOYALTY) ────────────────────────
        function LoyaltyScreen({ puntos }) {
          const rewards = [
            { pts: 500, title: "Lavado Premium Gratis", claim: true },
            { pts: 1000, title: "Descuento del 50% en tu Corte", claim: false },
            { pts: 2000, title: "Servicio Completo + Tratamiento Gratis", claim: false }
          ];

          return (
            <div style={{ flex: 1, padding: 18, paddingBottom: 80 }}>
              <h2 style={{ fontSize: 20, fontWeight: 800, marginBottom: 4 }}>Gonnie Rewards Club</h2>
              <p style={{ fontSize: 12, color: G.muted, marginBottom: 18 }}>Canjea tus puntos acumulados por servicios gratis</p>

              {rewards.map((r, i) => (
                <div key={i} style={{ background: G.card, padding: 16, borderRadius: 14, border: `1px solid ${G.bdr}`, marginBottom: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <span style={{ fontSize: 11, color: G.brand, fontWeight: 700 }}>{r.pts} PUNTOS</span>
                    <h4 style={{ fontSize: 14, fontWeight: 700, margin: "2px 0 0" }}>{r.title}</h4>
                  </div>
                  <button disabled={!r.claim} style={{ background: r.claim ? G.brand : G.card2, color: r.claim ? "#000" : G.muted, border: "none", padding: "6px 12px", borderRadius: 8, fontSize: 11, fontWeight: 700, cursor: r.claim ? "pointer" : "not-allowed" }}>
                    {r.claim ? "Canjear" : "Bloqueado"}
                  </button>
                </div>
              ))}
            </div>
          );
        }

       
       

        // ─── VISTA 9: PANEL DE CONTROL DE NEGOCIO (BUSINESS MODE / RECHARTS) ──
        function BusinessScreen() {
          const stats = [
            { m: "Lun", v: 420 }, { m: "Mar", v: 510 }, { m: "Mié", v: 490 },
            { m: "Jue", v: 680 }, { m: "Vie", v: 920 }, { m: "Sáb", v: 1100 }
          ];

          return (
            <div style={{ flex: 1, padding: 18, paddingBottom: 80 }}>
              <h2 style={{ fontSize: 20, fontWeight: 800, marginBottom: 4 }}>Panel de Control Profesional</h2>
              <p style={{ fontSize: 12, color: G.muted, marginBottom: 16 }}>Métricas de rendimiento en tiempo real</p>

              <div style={{ background: G.card, padding: 14, borderRadius: 14, border: `1px solid ${G.bdr}`, marginBottom: 16 }}>
                <p style={{ fontSize: 11, color: G.muted, margin: 0 }}>INGRESOS TOTALES (SEMANAL)</p>
                <p style={{ fontSize: 28, fontWeight: 900, color: G.brand, margin: "2px 0 10px" }}>4,120.00€</p>
                
                <div style={{ width: "100%", height: 140 }}>
                  <ResponsiveContainer>
                    <AreaChart data={stats}>
                      <XAxis dataKey="m" stroke={G.muted} fontSize={10} tickLine={false} />
                      <Tooltip contentStyle={{ background: G.card2, borderColor: G.bdr }} />
                      <Area type="monotone" dataKey="v" stroke={G.brand} fill={G.brand} fillOpacity={0.1} />
                    </AreaChart>
                  </ResponsiveContainer>
                </div>
              </div>

              <SLabel>Control de Barbería</SLabel>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                <div style={{ background: G.card, padding: 14, borderRadius: 12, textAlign: "center" }}><p style={{ fontSize: 20, margin: 0 }}>24</p><p style={{ fontSize: 11, color: G.muted, margin: 0 }}>Citas Hoy</p></div>
                <div style={{ background: G.card, padding: 14, borderRadius: 12, textAlign: "center" }}><p style={{ fontSize: 20, margin: 0 }}>96%</p><p style={{ fontSize: 11, color: G.muted, margin: 0 }}>Ocupación</p></div>
              </div>
            </div>
          );
        }

        // ─── VISTA 10: PERFIL DE USUARIO ──────────────────────────────────────
        function ProfileScreen({ setMode, mode, user }) {
          const nombre = user?.user_metadata?.full_name || user?.email || "Usuario";
          const avatar = user?.user_metadata?.avatar_url;
          const email = user?.email || "";
          const iniciales = nombre.split(" ").map(n => n[0]).join("").slice(0,2).toUpperCase();

          return (
            <div style={{ flex: 1, padding: 18, textAlign: "center", paddingTop: 30 }}>
              {avatar
                ? <img src={avatar} style={{ width: 64, height: 64, borderRadius: "50%", marginBottom: 10 }} />
                : <Av txt={iniciales} size={64} />
              }
              <h3 style={{ fontSize: 18, fontWeight: 800, marginTop: 10, marginBottom: 2 }}>{nombre}</h3>
              <p style={{ fontSize: 12, color: G.muted, marginTop: 0, marginBottom: 24 }}>{email}</p>

              <div style={{ textAlign: "left", background: G.card, borderRadius: 14, padding: 12, border: `1px solid ${G.bdr}`, marginBottom: 18 }}>
                <div style={{ padding: "10px 4px", cursor: "pointer", borderBottom: `1px solid ${G.bdr}` }} onClick={() => alert("Editar perfil en desarrollo")}>⚙️ Ajustes de Cuenta</div>
                <div style={{ padding: "10px 4px", cursor: "pointer" }} onClick={() => alert("Métodos de pago en desarrollo")}>💳 Tarjetas Guardadas</div>
              </div>

              <GhostBtn onClick={() => setMode(mode === "customer" ? "business" : "customer")}>
                {mode === "customer" ? "🔄 Cambiar a Modo Negocio" : "🔄 Cambiar a Modo Cliente"}
              </GhostBtn>

              <button onClick={signOut} style={{ marginTop: 12, width: "100%", background: "transparent", border: `0.5px solid ${G.red}40`, borderRadius: 14, padding: "12px", fontSize: 13, color: G.red, cursor: "pointer", fontWeight: 600 }}>
                Cerrar sesión
              </button>
            </div>
          );
        }

        // ─── ENRUTADOR PRINCIPAL (APP CONTAINER) ────────────────────────────────
        function GonnieApp() {
          const [user, setUser] = useState(null);
          const [authLoading, setAuthLoading] = useState(true);
          const [splash, setSplash] = useState(true);
          const [view, setView] = useState("home");
          const [mode, setMode] = useState("customer");
          const [barberia, setBarberia] = useState(null);
          const [booking, setBooking] = useState(null);
          const [confirmedAppt, setConfirmedAppt] = useState(null);
          const [puntos, setPuntos] = useState(0);

          // Cargar puntos reales del usuario desde Supabase
          const cargarPuntos = async (email) => {
            try {
              const data = await dbGet("appointments", `?client_email=eq.${encodeURIComponent(email)}&select=points_earned`);
              if (Array.isArray(data)) {
                const total = data.reduce((sum, a) => sum + (a.points_earned || 0), 0);
                setPuntos(total);
              }
            } catch(e) { console.warn("No se pudieron cargar los puntos:", e.message); }
          };

          useEffect(() => {
            // Comprobar sesión existente (cuando Google redirige de vuelta)
            supabaseClient.auth.getSession().then(({ data: { session } }) => {
              setUser(session?.user || null);
              setAuthLoading(false);
              if (session?.user) {
                setSplash(false);
                cargarPuntos(session.user.email);
              }
            });
            // Escuchar cambios de sesión en tiempo real
            const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => {
              setUser(session?.user || null);
              if (session?.user) {
                setSplash(false);
                cargarPuntos(session.user.email);
              }
            });
            return () => subscription.unsubscribe();
          }, []);

          // Pantalla de carga mientras comprueba sesión
          if (authLoading) return (
            <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: G.bg }}>
              <div style={{ textAlign: "center" }}>
                <div style={{ width: 60, height: 60, borderRadius: 18, background: G.brand, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, marginBottom: 16, marginLeft: "auto", marginRight: "auto" }}>✂</div>
                <p style={{ color: G.muted, fontSize: 13 }}>Cargando Gonnie...</p>
              </div>
            </div>
          );

          // Sin sesión → pantalla de login
          if (!user) return (
            <div className="flex justify-center bg-black min-h-screen">
              <div style={{ width: "100%", maxWidth: 420, background: G.bg }}>
                <LoginScreen />
              </div>
            </div>
          );

          // Con sesión → splash o app
          if (splash) return (
            <div className="flex justify-center bg-black min-h-screen">
              <div style={{ width: "100%", maxWidth: 420, background: G.bg }}>
                <SplashScreen onDone={() => setSplash(false)} />
              </div>
            </div>
          );

          return (
            <div className="flex justify-center bg-black min-h-screen">
              <div style={{ width: "100%", maxWidth: 420, background: G.bg, minHeight: "100vh", position: "relative", display: "flex", flexDirection: "column" }}>
                <div style={{ flex: 1, overflowY: "auto" }}>
                  {mode === "business" ? (
                    <BusinessScreen />
                  ) : (
                    <>
                      {view === "home" && <HomeScreen nav={setView} user={user} puntos={puntos} />}
                      {view === "explore" && <ExploreScreen nav={setView} setBarberia={setBarberia} />}
                      {view === "detail" && <DetailScreen barberia={barberia} nav={setView} setBooking={setBooking} />}
                      {view === "booking" && <BookingScreen booking={booking} nav={setView} setConfirmedAppt={setConfirmedAppt} setPuntos={setPuntos} user={user} />}
                      {view === "confirmed" && <ConfirmedScreen nav={setView} appt={confirmedAppt} />}
                      {view === "appointments" && <AppointmentsScreen />}
                      {view === "loyalty" && <LoyaltyScreen puntos={puntos} />}
                      {view === "profile" && <ProfileScreen setMode={setMode} mode={mode} user={user} />}
                    </>
                  )}
                </div>
                {view !== "confirmed" && (
                  <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: 68, background: G.card, borderTop: `0.5px solid ${G.bdr}`, display: "flex", alignItems: "center", zIndex: 50 }}>
                    {[
                      { id: "home", l: "Inicio", i: "🏠" },
                      { id: "explore", l: "Explorar", i: "🔍" },
                      { id: "appointments", l: "Citas", i: "📅" },
                      { id: "loyalty", l: "Club", i: "🏆" },
                      { id: "profile", l: "Perfil", i: "👤" }
                    ].map(n => (
                      <button key={n.id} onClick={() => { if(mode === "business") setMode("customer"); setView(n.id); }} style={{ flex: 1, background: "transparent", border: "none", color: (view === n.id && mode === "customer") ? G.brand : G.muted, fontSize: 11, fontWeight: 600, display: "flex", flexDirection: "column", alignItems: "center", gap: 2, cursor: "pointer" }}>
                        <span style={{ fontSize: 18 }}>{n.i}</span> {n.l}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GonnieApp />);
    </script>
</body>
</html>
