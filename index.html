<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gonnie</title>
</head>
<body>
<div id="root"><p style="font-family:sans-serif;padding:20px">Limpiando caché...</p></div>
<script>
  // Eliminar todos los service workers y cachés
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(registrations) {
      var promises = registrations.map(function(r) { return r.unregister(); });
      return Promise.all(promises);
    }).then(function() {
      return caches.keys();
    }).then(function(keys) {
      return Promise.all(keys.map(function(k) { return caches.delete(k); }));
    }).then(function() {
      document.getElementById('root').innerHTML = '<p style="font-family:sans-serif;padding:20px;color:green">✓ Caché limpiada. Recargando...</p>';
      setTimeout(function() { window.location.reload(true); }, 2000);
    });
  } else {
    window.location.reload(true);
  }
</script>
</body>
</html>
