        // ─── SUPABASE AUTH CLIENT ───────────────────────────────────────────────
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Devuelve el token de la sesión activa (para que Supabase sepa QUIÉN hace
        // cada petición y las políticas de seguridad por fila funcionen). Si no hay
        // sesión, cae de vuelta a la clave pública (igual que antes).
        async function getAuthToken() {
          try {
            const { data } = await supabaseClient.auth.getSession();
            if (data && data.session && data.session.access_token) return data.session.access_token;
          } catch (e) {}
          return SUPABASE_KEY;
        }

        async function getDbHeaders() {
          const token = await getAuthToken();
          return {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${token}`,
            "Content-Type": "application/json",
            Prefer: "return=representation",
          };
        }

        async function dbGet(table, query = "") {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, { headers: await getDbHeaders() });
          if (!res.ok) throw new Error(await res.text());
          return res.json();
        }

        async function dbInsert(table, data) {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
            method: "POST", headers: await getDbHeaders(), body: JSON.stringify(data),
          });
          if (!res.ok) throw new Error(await res.text());
          return res.json();
        }

        async function dbDelete(table, query = "") {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, {
            method: "DELETE", headers: await getDbHeaders(),
          });
          if (!res.ok) throw new Error(await res.text());
          return res.json();
        }

        function getProgreso(puntos) {
          const nivel = getNivel(puntos);
          if (nivel.nombre === "Platino") return 100;
          return Math.min(((puntos - nivel.min) / (nivel.max - nivel.min)) * 100, 100);
        }

        function getPtsParaSiguiente(puntos) {

        // ─── HELPER: HORARIO DEL NEGOCIO ──────────────────────────────────────
        // Convención: dia = 0 (domingo) .. 6 (sábado), igual que Date.getDay()
        var DIAS_SEMANA_LARGO = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

        function franjasASlots(franjas) {
          var out = [];
          (franjas || []).forEach(function(f) {
            if (!f || !f.inicio || !f.fin) return;
            var p1 = f.inicio.split(':'), p2 = f.fin.split(':');
            var cur = Number(p1[0]) * 60 + Number(p1[1]);
            var end = Number(p2[0]) * 60 + Number(p2[1]);
            while (cur < end) {
              out.push(String(Math.floor(cur / 60)).padStart(2, '0') + ':' + String(cur % 60).padStart(2, '0'));
              cur += 30;
            }
          });
          return out;
        }

        function horarioDelDia(fechaStr, horarioSemana) {
          if (!fechaStr || !Array.isArray(horarioSemana)) return null;
          var dow = new Date(fechaStr + 'T00:00:00').getDay();
          return horarioSemana.find(function(h){ return h.dia === dow; }) || null;
        }

        function diaCerrado(fechaStr, horarioSemana, diasCerrados) {
          if (!fechaStr) return false;
          if (Array.isArray(diasCerrados) && diasCerrados.indexOf(fechaStr) >= 0) return true;
          var h = horarioDelDia(fechaStr, horarioSemana);
          return !h || !h.abierto;
        }

        function slotsParaFecha(fechaStr, horarioSemana, diasCerrados) {
          if (diaCerrado(fechaStr, horarioSemana, diasCerrados)) return [];
          var h = horarioDelDia(fechaStr, horarioSemana);
          return h ? franjasASlots(h.franjas) : [];
        }

        // ─── PANTALLA: NUEVA CONTRASEÑA (tras enlace de recuperación) ──────────
        function NewPasswordScreen({ onDone }) {
          const [password, setPassword] = useState('');
          const [password2, setPassword2] = useState('');
          const [error, setError] = useState('');
          const [saving, setSaving] = useState(false);
          const [done, setDone] = useState(false);

          async function handleSave() {
            if (password.length < 6) { setError('La contraseña debe tener al menos 6 caracteres.'); return; }
            if (password !== password2) { setError('Las contraseñas no coinciden.'); return; }
            setError(''); setSaving(true);
            const res = await supabaseClient.auth.updateUser({ password: password });
            setSaving(false);
            if (res.error) { setError(res.error.message); return; }
            setDone(true);
            setTimeout(function(){ onDone(); }, 1200);
          }

          return (
            <div style={{ minHeight: '100vh', background: '#fff', display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: '0 28px 48px' }}>
              <h1 style={{ fontSize: 26, fontWeight: 800, color: '#000', margin: '0 0 10px' }}>Crea una nueva contraseña</h1>

                <>
                  <input type="password" value={password} onChange={function(e){ setPassword(e.target.value); }} placeholder="Nueva contraseña" autoCapitalize="none" autoCorrect="off"
                    style={{ width: '100%', boxSizing: 'border-box', border: '1px solid #ddd', borderRadius: 16, padding: '16px 18px', fontSize: 16, marginBottom: 10, fontFamily: 'inherit', background: '#fff', color: '#000', colorScheme: 'light' }} />
                  <input type="password" value={password2} onChange={function(e){ setPassword2(e.target.value); }} placeholder="Repite la contraseña" autoCapitalize="none" autoCorrect="off"
                    style={{ width: '100%', boxSizing: 'border-box', border: '1px solid #ddd', borderRadius: 16, padding: '16px 18px', fontSize: 16, marginBottom: 10, fontFamily: 'inherit', background: '#fff', color: '#000', colorScheme: 'light' }} />
                  {error && <p style={{ fontSize: 12, color: '#e33', margin: '0 0 10px' }}>{error}</p>}
                  <button onClick={handleSave} disabled={saving}
                    style={{ width: '100%', background: '#000', color: '#fff', border: 'none', borderRadius: 16, padding: '16px 20px', fontSize: 15, fontWeight: 700, cursor: saving ? 'not-allowed' : 'pointer', opacity: saving ? 0.6 : 1, fontFamily: 'inherit' }}>

        function NotiCard({ noti, col, onDismiss }) {
          const [dx, setDx] = useState(0);
          const [startX, setStartX] = useState(null);
          const [saliendo, setSaliendo] = useState(false);

          function onStart(e){ setStartX(e.touches ? e.touches[0].clientX : e.clientX); }
          function onMove(e){
            if (startX === null) return;
            var x = e.touches ? e.touches[0].clientX : e.clientX;
            var delta = x - startX;
            if (delta < 0) setDx(delta); // solo permite arrastrar a la izquierda
          }
          function onEnd(){
            if (startX === null) return;
            if (dx < -90) {
              setSaliendo(true);
              setDx(-400);
              setTimeout(function(){ onDismiss(noti.id); }, 180);
            } else {
              setDx(0);
            }
            setStartX(null);
          }

          return (
            <div style={{ position: "relative", marginBottom: 10, overflow: "hidden", borderRadius: 14 }}>
              <div style={{ position: "absolute", inset: 0, background: G.red, borderRadius: 14, display: "flex", alignItems: "center", justifyContent: "flex-end", paddingRight: 18 }}>
                <span style={{ color: "#fff", fontSize: 13, fontWeight: 700 }}>Quitar</span>

        function HomeScreen({ nav, user, puntos = 0, setGroupMode }) {
          const nivel = getNivel(puntos);
          const progreso = getProgreso(puntos);
          const ptsSiguiente = getPtsParaSiguiente(puntos);
          const [nextAppt, setNextAppt] = useState(null);
          const [cancelling, setCancelling] = useState(false);
          const [confirmCancel, setConfirmCancel] = useState(false);
          const [cancelDone, setCancelDone] = useState(false);
          const [showReschedule, setShowReschedule] = useState(false);
          const [rescheduleDate, setRescheduleDate] = useState('');
          const [rescheduleSlot, setRescheduleSlot] = useState('');

          const [rescheduleDone, setRescheduleDone] = useState(false);
          const [showNotis, setShowNotis] = useState(false);
          const [notis, setNotis] = useState([]);
          const [descartadas, setDescartadas] = useState(function(){
            try { return JSON.parse(localStorage.getItem('gonnie_notis_descartadas') || '[]'); } catch(e) { return []; }

          const [horarioSemana, setHorarioSemana] = useState([]);
          const [diasCerrados, setDiasCerrados] = useState([]);

          useEffect(function() {
            dbGet('horario_negocio', '?select=*').then(function(d){ setHorarioSemana(Array.isArray(d) ? d : []); }).catch(function(){});
            dbGet('dias_cerrados', '?select=fecha').then(function(d){ setDiasCerrados(Array.isArray(d) ? d.map(function(x){ return x.fecha; }) : []); }).catch(function(){});
          }, []);

          var slots = slotsParaFecha(rescheduleDate, horarioSemana, diasCerrados);
          var rescheduleCerrado = rescheduleDate ? diaCerrado(rescheduleDate, horarioSemana, diasCerrados) : false;

          // Construir avisos a partir de las citas del cliente
          useEffect(function() {
            var email = user && user.email;
            if (!email) return;
            var hoy = new Date(); hoy.setHours(0,0,0,0);
            dbGet('appointments', '?client_email=eq.' + encodeURIComponent(email) + '&order=date.desc,time.desc&limit=20&select=*,servicios(name),barberos(name)')
              .then(function(d) {
                if (!Array.isArray(d)) { setNotis([]); return; }
                var avisos = [];
                d.forEach(function(c) {
                  if (!c.date) return;
                  var fechaCita = new Date(c.date + 'T00:00:00');
                  var difDias = Math.round((fechaCita - hoy) / 86400000);
                  var servicio = (c.servicios && c.servicios.name) || 'tu cita';
                  var horaTxt = c.time ? c.time.slice(0,5) : '';
                  var idBase = (c.id || c.date) + '_';
                  if (c.status === 'cancelled') {
                    avisos.push({ id: idBase + 'cancel', tipo: 'cancel', titulo: 'Cita cancelada', texto: servicio + ' del ' + c.date + ' fue cancelada', date: c.date });
                  } else if (difDias === 0) {
                    avisos.push({ id: idBase + 'hoy', tipo: 'hoy', titulo: '¡Tu cita es hoy!', texto: servicio + ' a las ' + horaTxt, date: c.date });
                  } else if (difDias === 1) {
                    avisos.push({ id: idBase + 'manana', tipo: 'manana', titulo: 'Cita mañana', texto: servicio + ' a las ' + horaTxt, date: c.date });
                  } else if (difDias > 1) {
                    avisos.push({ id: idBase + 'futura', tipo: 'futura', titulo: 'Cita confirmada', texto: servicio + ' el ' + c.date + ' a las ' + horaTxt, date: c.date });
                  } else {
                    avisos.push({ id: idBase + 'pasada', tipo: 'pasada', titulo: '¿Qué tal quedó?', texto: 'Esperamos que disfrutaras de ' + servicio, date: c.date });
                  }
                });
                // Aviso de fidelización
                if (ptsSiguiente > 0 && ptsSiguiente <= 60) {
                  avisos.unshift({ id: 'puntos_' + getNivel(puntos + ptsSiguiente).nombre, tipo: 'puntos', titulo: 'Estás cerca del siguiente nivel', texto: 'Te faltan ' + ptsSiguiente + ' puntos para ' + getNivel(puntos + ptsSiguiente).nombre, date: '' });
                }
                setNotis(avisos);
              }).catch(function(){ setNotis([]); });
          }, [user && user.email, puntos]);

          useEffect(function() {
            var email = user && user.email;
            if (!email) return;
            var today = new Date().toISOString().split('T')[0];
            dbGet('appointments', '?client_email=eq.' + encodeURIComponent(email) + '&date=gte.' + today + '&status=eq.confirmed&order=date.asc,time.asc&limit=1&select=*,servicios(name),barberos(name)')
              .then(function(d) {
                if (Array.isArray(d) && d.length > 0) setNextAppt(d[0]);
              }).catch(function(){});
          }, [user && user.email]);

         const nombre = (user && user.user_metadata && user.user_metadata.full_name && user.user_metadata.full_name.split(" ")[0]) || "tú";

          function descartarNoti(id) {
            setDescartadas(function(prev){
              var nuevas = prev.indexOf(id) >= 0 ? prev : prev.concat([id]);
              try { localStorage.setItem('gonnie_notis_descartadas', JSON.stringify(nuevas)); } catch(e) {}

                    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", background: G.card, borderRadius: 16, padding: "10px 14px", textAlign: "center" }}>

                    </div>
                  </div>
                  <div style={{ background: "rgba(15,42,32,0.15)", borderRadius: 8, height: 6, overflow: "hidden", position: "relative" }}>
                    <div style={{ width: `${progreso}%`, height: "100%", background: "#1A1614", borderRadius: 8, transition: "width 0.8s ease" }} />
                  </div>
                </div>

                {/* Próxima Cita */}
                <div style={{ background: G.card, border: `1px solid ${G.bdr}`, borderRadius: 24, padding: "16px 16px", marginBottom: 16 }}>
                  {cancelDone && (
                <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(255,255,255,0.95)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', zIndex: 999 }}>
                  <AnimCheck type="cross" />
                  <p style={{ fontSize: 16, fontWeight: 700, color: '#FF3B30', marginTop: 8 }}>Cita cancelada</p>
                </div>

              {nextAppt ? (
                  <div>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                      <p style={{ fontSize: 10, color: G.muted, fontWeight: 700, textTransform: "uppercase" }}>Próxima cita</p>
                      <Pill color="#080B0F" bg={G.green}>{nextAppt.date} · {nextAppt.time}</Pill>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>

                      <div style={{ flex: 1 }}>
                        <p style={{ fontSize: 15, fontWeight: 700, color: G.text }}>{nextAppt.servicios && nextAppt.servicios.name}</p>
                        <p style={{ fontSize: 12, color: G.muted }}>{nextAppt.barberos && nextAppt.barberos.name}</p>

                    </div>
                    <div style={{ marginTop: 10 }}>
                      {/* Botones principales */}
                      {!confirmCancel && !showReschedule && (

                            Cambiar fecha
                          </button>
                          <button onClick={function(){ setConfirmCancel(true); }} style={{ flex: 1, background: 'transparent', border: '1px solid ' + G.red + '40', borderRadius: 10, padding: '9px', fontSize: 12, color: G.red, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>
                            Cancelar cita
                          </button>
                        </div>
                      )}

                      {/* Confirmar cancelación */}
                      {confirmCancel && (
                        <div style={{ background: G.red + '10', border: '1px solid ' + G.red + '30', borderRadius: 10, padding: '12px' }}>
                          <p style={{ fontSize: 12, color: G.red, textAlign: 'center', marginBottom: 10, fontWeight: 600 }}>¿Seguro que quieres cancelar?</p>
                          <div style={{ display: 'flex', gap: 8 }}>
                            <button onClick={function(){ setConfirmCancel(false); }} style={{ flex: 1, background: 'transparent', border: '1px solid ' + G.bdr, borderRadius: 8, padding: '8px', fontSize: 12, color: G.muted, cursor: 'pointer', fontFamily: 'inherit' }}>No</button>
                            <button onClick={function(){
                              setCancelling(true);
                              cancelBooking(nextAppt.id, nextAppt, user && user.email, user && user.user_metadata && user.user_metadata.full_name)
                                .then(function(){ setCancelling(false); setConfirmCancel(false); setCancelDone(true); setTimeout(function(){ setNextAppt(null); setCancelDone(false); }, 2000); })
                                .catch(function(){ setCancelling(false); });
                            }} style={{ flex: 1, background: G.red, border: 'none', borderRadius: 8, padding: '8px', fontSize: 12, color: '#fff', cursor: cancelling ? 'not-allowed' : 'pointer', fontFamily: 'inherit', fontWeight: 700 }}>

                      {/* Panel de reagendado */}
                      {showReschedule && (

                                  style={{ background: rescheduleSlot === s ? G.brand : G.card, color: rescheduleSlot === s ? '#fff' : G.text, border: '1px solid ' + G.bdr, padding: '8px', borderRadius: 8, fontWeight: 700, cursor: 'pointer', fontSize: 12, fontFamily: 'inherit' }}>
                                  {s}

                          <div style={{ display: 'flex', gap: 8 }}>
                            <button onClick={function(){ setShowReschedule(false); setRescheduleDate(''); setRescheduleSlot(''); }}
                              style={{ flex: 1, background: 'transparent', border: '1px solid ' + G.bdr, borderRadius: 8, padding: '8px', fontSize: 12, color: G.muted, cursor: 'pointer', fontFamily: 'inherit' }}>
                              Cancelar
                            </button>
                            <button disabled={!rescheduleDate || !rescheduleSlot || rescheduling} onClick={async function(){
                              if (!rescheduleDate || !rescheduleSlot) return;
                              setRescheduling(true);
                              try {
                                await fetch('https://fnjqzcnufkhrfzxfallj.supabase.co/rest/v1/appointments?id=eq.' + nextAppt.id, {
                                  method: 'PATCH',
                                  headers: Object.assign({}, await getDbHeaders(), { 'Prefer': 'return=minimal' }),
                                  body: JSON.stringify({ date: rescheduleDate, time: rescheduleSlot })
                                });
                                setNextAppt(Object.assign({}, nextAppt, { date: rescheduleDate, time: rescheduleSlot }));
                                setShowReschedule(false); setRescheduleDate(''); setRescheduleSlot('');
                                setRescheduleDone(true);
                                setTimeout(function(){ setRescheduleDone(false); }, 2500);
                              } catch(e) {} finally { setRescheduling(false); }
                            }} style={{ flex: 1, background: (!rescheduleDate || !rescheduleSlot) ? G.bdr : G.brand, border: 'none', borderRadius: 8, padding: '8px', fontSize: 12, color: '#fff', cursor: (!rescheduleDate || !rescheduleSlot || rescheduling) ? 'not-allowed' : 'pointer', fontFamily: 'inherit', fontWeight: 700 }}>
                              {rescheduling ? 'Guardando...' : 'Confirmar'}
                            </button>
                          </div>
                        </div>
                      )}

                      {/* Confirmación de reagendado */}
                      {rescheduleDone && (
                        <p style={{ fontSize: 12, color: G.green, textAlign: 'center', marginTop: 8, fontWeight: 700 }}>✓ Cita reagendada correctamente</p>
                      )}
                    </div>
                  </div>
                ) : (
                  <div style={{ textAlign: "center", padding: "10px 0" }}>
                    <p style={{ fontSize: 13, color: G.muted }}>No tienes citas próximas</p>
                    <button onClick={function(){ setGroupMode(false); nav("explore"); }} style={{ marginTop: 8, background: "transparent", border: "none", color: G.brand, fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>Reservar ahora →</button>
                  </div>
                )}

                {/* Botones de acción */}
                <SLabel>Acciones rápidas</SLabel>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 18 }}>
                  {[
                    { svg: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M20 4L8.12 15.88M14.47 14.48L20 20M8.12 8.12L12 12"/></svg>', label: "Reservar cita", action: () => { setGroupMode(false); nav("explore"); }, bg: G.coral, fg: "#FFFFFF" },
                    { svg: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/><path d="M16 3.13a4 4 0 010 7.75"/><path d="M21 21v-2a4 4 0 00-3-3.87"/></svg>', label: "Reserva grupal", action: () => { setGroupMode(true); nav("explore"); }, isNew: true, bg: G.mint, fg: "#0F2A20" },
                    { svg: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>', label: "Chat barbería", action: () => window.open("https://wa.me/34663528459", "_blank"), bg: "#1A1614", fg: "#F8F1E3" },
                    { svg: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>', label: "Tienda", action: () => nav("shop"), bg: G.rose, fg: "#3A0F1B" },
                  ].map((a, i) => (
                    <div key={i} onClick={a.action} style={{ background: a.bg, borderRadius: 20, padding: "16px 14px 14px", cursor: "pointer", position: "relative" }}>

                      <span style={{ color: a.fg, display: "block", marginBottom: 8 }} dangerouslySetInnerHTML={{ __html: a.svg.replace(/strokeWidth/g, 'stroke-width').replace(/<svg /, '<svg stroke="' + a.fg + '" ') }} />
                      <span style={{ fontFamily: "'Bricolage Grotesque'", fontSize: 14, fontWeight: 600, color: a.fg }}>{a.label}</span>
                    </div>
                  ))}
                </div>

               
            </div>

              {/* Panel de notificaciones */}
              {showNotis && (
                <div onClick={function(){ setShowNotis(false); }}
                  style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", display: "flex", alignItems: "flex-start", justifyContent: "flex-end", zIndex: 200 }}>
                  <div onClick={function(e){ e.stopPropagation(); }}
                    style={{ width: "88%", maxWidth: 380, height: "100%", background: G.bg, boxShadow: "-4px 0 24px rgba(0,0,0,0.15)", display: "flex", flexDirection: "column" }}>
                    <div style={{ padding: "20px 18px 14px", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: "1px solid " + G.bdr }}>

        // ─── VISTA 2: EXPLORAR BARBERÍAS (REAL DESDE SUPABASE) ────────────────
        function estaAbierto() {
          var now = new Date();
          var h = now.getHours();
          var m = now.getMinutes();
          var t = h * 60 + m;
          return (t >= 600 && t < 840) || (t >= 1020 && t < 1260); // 10-14 y 17-21
        }

        function getFavoritos() {
          try { return JSON.parse(localStorage.getItem('gonnie_favoritos') || '[]'); } catch(e) { return []; }
        }
        function toggleFavorito(id) {
          var favs = getFavoritos();
          var idx = favs.indexOf(String(id));
          if (idx === -1) favs.push(String(id)); else favs.splice(idx, 1);
          localStorage.setItem('gonnie_favoritos', JSON.stringify(favs));
          return idx === -1;
        }

        function BarberiaCard({ b, onSelect }) {
          const [esFav, setEsFav] = useState(getFavoritos().includes(String(b.id)));

            '💈': '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="COL" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6l2 5H7L9 3z"/><path d="M7 8c0 5 2 9 5 10 3-1 5-5 5-10"/></svg>',
            '🧔': '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="COL" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-3 2-5 5-6h6c3 1 5 3 5 6"/><path d="M9 14c1 2 2 3 3 3s2-1 3-3"/></svg>',
            '💎': '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="COL" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12l4 6-10 12L2 9z"/><path d="M2 9h20"/></svg>',
          };
          var svg = icons[icon] || icons['✂️'];
          return svg.replace(/COL/g, color);
        }

        function BookingScreen({ booking, nav, setConfirmedAppt, setPuntos, user, groupMode, setGroupMode }) {
          const [date, setDate] = useState("");
          const [slot, setSlot] = useState("");
          const [slot2, setSlot2] = useState("");
          const [nombre2, setNombre2] = useState("");
          const [saving, setSaving] = useState(false);
          const [metodoPago, setMetodoPago] = useState("");
          const [ocupados, setOcupados] = useState([]);
          const [loadingHoras, setLoadingHoras] = useState(false);
          const [blocked, setBlocked] = useState(false);
          const [checkingBlocked, setCheckingBlocked] = useState(true);
          const [horarioSemana, setHorarioSemana] = useState([]);
          const [diasCerrados, setDiasCerrados] = useState([]);
          const slots = slotsParaFecha(date, horarioSemana, diasCerrados);
          const fechaCerrada = date ? diaCerrado(date, horarioSemana, diasCerrados) : false;

          useEffect(function() {
            dbGet('horario_negocio', '?select=*').then(function(d){ setHorarioSemana(Array.isArray(d) ? d : []); }).catch(function(){});
            dbGet('dias_cerrados', '?select=fecha').then(function(d){ setDiasCerrados(Array.isArray(d) ? d.map(function(x){ return x.fecha; }) : []); }).catch(function(){});
          }, []);

          // Comprobar si esta cuenta tiene bloqueado el poder reservar
          useEffect(function() {
            if (!user || !user.email) { setCheckingBlocked(false); return; }
            dbGet("usuarios_bloqueados", "?email=eq." + encodeURIComponent(user.email) + "&select=id")
              .then(function(data){ setBlocked(Array.isArray(data) && data.length > 0); setCheckingBlocked(false); })
              .catch(function(){ setCheckingBlocked(false); });
          }, [user]);

          // Cargar horas ya reservadas para la fecha y barbero elegidos
          useEffect(function() {
            if (!date) { setOcupados([]); return; }
            setLoadingHoras(true);
            setSlot("");
            setSlot2("");
            dbGet("appointments", "?date=eq." + date + "&barbero_id=eq." + booking.bar.id + "&status=neq.cancelled&select=time")
              .then(function(data){
                var arr = Array.isArray(data) ? data : [];
                setOcupados(arr.map(function(a){ return a.time ? a.time.slice(0,5) : ''; }));
                setLoadingHoras(false);
              })
              .catch(function(){ setOcupados([]); setLoadingHoras(false); });
          }, [date]);

          const confirm = async () => {
            if (blocked) return alert("No puedes reservar en este momento. Contacta con la barbería.");
            if (!date || !slot) return alert("Selecciona fecha y hora");
            if (groupMode && !slot2) return alert("Selecciona también la hora para la segunda persona");
            if (groupMode && slot2 === slot) return alert("Elige dos horas diferentes para cada persona");
            setSaving(true);
            try {
             const payload = {
  barberia_id: booking.barberia.id,
  barbero_id: booking.bar.id,
  servicio_id: booking.svc.id,
  client_name: (user && user.user_metadata && user.user_metadata.full_name) || "Cliente",
  client_email: (user && user.email) || "",
  date,
  time: slot,
  price: booking.svc.price,
  payment_method: metodoPago || null,
  points_earned: Math.floor(booking.svc.price * 2)
};

              await dbInsert("appointments", payload);

              var payload2 = null;
              if (groupMode) {
                payload2 = {
                  barberia_id: booking.barberia.id,
                  barbero_id: booking.bar.id,
                  servicio_id: booking.svc.id,
                  client_name: nombre2 || "Acompañante",
                  client_email: (user && user.email) || "",
                  date,
                  time: slot2,
                  price: booking.svc.price,
                  payment_method: metodoPago || null,
                  points_earned: 0
                };
                await dbInsert("appointments", payload2);
              }

              setConfirmedAppt(groupMode ? Object.assign({}, payload, { time2: slot2, nombre2: nombre2 || "Acompañante" }) : payload);

              // Enviar emails de confirmación
              await sendConfirmationEmail({
                barberia: (booking.barberia && booking.barberia.name) || "GonnieBarbershop",
                barbero: (booking.bar && booking.bar.name) || "Barbero",
                servicio: (booking.svc && booking.svc.name) || "Servicio",
                fecha: date,
                hora: slot,
                precio: (booking.svc && booking.svc.price) || 0,
                cliente: (user && user.user_metadata && user.user_metadata.full_name) || (user && user.email) || "Cliente",
                email_cliente: (user && user.email) || "",
              });
              if (groupMode) {
                await sendConfirmationEmail({
                  barberia: (booking.barberia && booking.barberia.name) || "GonnieBarbershop",
                  barbero: (booking.bar && booking.bar.name) || "Barbero",
                  servicio: (booking.svc && booking.svc.name) || "Servicio",
                  fecha: date,
                  hora: slot2,
                  precio: (booking.svc && booking.svc.price) || 0,
                  cliente: nombre2 || "Acompañante",
                  email_cliente: (user && user.email) || "",
                });
              }
              setPuntos(prev => prev + Math.floor(((booking.svc && booking.svc.price) || 0) * 2));
              if (setGroupMode) setGroupMode(false);
              nav("confirmed");
            } catch (e) {
              // Si falla la tabla simulada, igual avanza para experiencia fluida
              setConfirmedAppt(groupMode
                ? { ...booking, date, time: slot, time2: slot2, nombre2: nombre2 || "Acompañante", price: booking.svc.price }
                : { ...booking, date, time: slot, price: booking.svc.price });
              if (setGroupMode) setGroupMode(false);
              nav("confirmed");
            } finally { setSaving(false); }
          };

          if (checkingBlocked) {
            return (
              <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", background: "#1A1614" }}>
                <p style={{ color: "rgba(248,241,227,0.5)", fontSize: 13 }}>Cargando...</p>
              </div>
            );
          }

          if (blocked) {
            return (

        // ─── VISTA 6: HISTORIAL DE CITAS (APPOINTMENTS) ───────────────────────
        function AppointmentsScreen({ user }) {
          const [citas, setCitas] = useState([]);
          const [loading, setLoading] = useState(true);
          const [mesesAbiertos, setMesesAbiertos] = useState({});

          var meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

          useEffect(function() {
            if (!user || !user.email) { setLoading(false); return; }
            dbGet('appointments', '?client_email=eq.' + encodeURIComponent(user.email) + '&order=date.desc,time.desc&select=*,barberos(name),servicios(name,price)')
              .then(function(data) {
                var now = new Date();
                var pasadas = (Array.isArray(data) ? data : []).filter(function(c) {
                  if (c.status === 'cancelled') return false;
                  var dt = new Date(c.date + 'T' + (c.time || '00:00'));
                  return dt < now;
                });
                setCitas(pasadas);
                // Abrir el mes más reciente por defecto
                if (pasadas.length > 0) {
                  var d = new Date(pasadas[0].date);
                  var key = d.getFullYear() + '-' + d.getMonth();
                  setMesesAbiertos({ [key]: true });
                }
                setLoading(false);
              })
              .catch(function() { setLoading(false); });
          }, [user]);

          // Agrupar por mes
          var grupos = [];
          citas.forEach(function(c) {
            var d = new Date(c.date);
            var key = d.getFullYear() + '-' + d.getMonth();
            var label = meses[d.getMonth()] + ' ' + d.getFullYear();
            var g = grupos.find(function(x){ return x.key === key; });
            if (!g) { g = { key: key, label: label, citas: [] }; grupos.push(g); }
            g.citas.push(c);
          });

          function toggleMes(key) {
            setMesesAbiertos(function(prev) {
              var n = Object.assign({}, prev);
              n[key] = !n[key];
              return n;
            });
          }

          return (
            <div style={{ flex: 1, overflowY: 'auto', padding: '20px 18px', paddingBottom: 80 }}>
              <h2 style={{ fontFamily: "'Bricolage Grotesque'", fontSize: 24, fontWeight: 700, marginBottom: 16, color: G.text }}>Mis Reservas</h2>
              {loading && (
                <div>
                  <Skeleton h={54} r={20} />
                  <Skeleton h={54} r={20} />
                </div>
              )}
              {!loading && citas.length === 0 && (
                <div style={{ textAlign: 'center', padding: '50px 20px' }}>
                  <div style={{ width: 88, height: 88, borderRadius: '50%', background: G.rose, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px' }}>
                    <svg width="46" height="46" viewBox="0 0 46 46"><circle cx="17" cy="18" r="2.2" fill="#3A0F1B"/><circle cx="29" cy="18" r="2.2" fill="#3A0F1B"/><path d="M15 27 Q23 22 31 27" stroke="#3A0F1B" strokeWidth="2.2" fill="none" strokeLinecap="round"/></svg>
                  </div>
                  <p style={{ fontFamily: "'Bricolage Grotesque'", fontSize: 16, fontWeight: 600, color: G.text, margin: '0 0 4px' }}>Todavía nada por aquí</p>
                  <p style={{ fontSize: 13, color: G.muted, margin: 0 }}>Cuando completes una cita, aparecerá en tu historial</p>
                </div>
              )}
              {!loading && grupos.map(function(g) {
                var abierto = mesesAbiertos[g.key];
                return (
                  <div key={g.key} style={{ marginBottom: 12 }}>
                    {/* Cabecera del mes */}
                    <button onClick={function(){ toggleMes(g.key); }}
                      style={{ width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'space-between', background: G.card, border: 'none', borderRadius: abierto ? '20px 20px 0 0' : 20, padding: '14px 18px', cursor: 'pointer', fontFamily: "'Bricolage Grotesque'" }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                        <span style={{ fontSize: 15, fontWeight: 600, color: G.text }}>{g.label}</span>
                        <span style={{ fontSize: 11, color: G.muted, background: G.bg, borderRadius: 20, padding: '2px 9px' }}>{g.citas.length} {g.citas.length === 1 ? 'cita' : 'citas'}</span>
                      </div>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={G.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                        style={{ transform: abierto ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.2s' }}>
                        <path d="M6 9l6 6 6-6"/>
                      </svg>
                    </button>
                    {/* Citas del mes */}
                    {abierto && g.citas.map(function(c, i) {
                      return (
                        <div key={c.id || i} style={{ background: G.card, borderTop: `1px solid ${G.bdr}`, borderRadius: i === g.citas.length - 1 ? '0 0 20px 20px' : 0, padding: '14px 18px' }}>
                          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 4 }}>
                            <p style={{ fontFamily: "'Bricolage Grotesque'", fontSize: 14, fontWeight: 600, margin: 0, color: G.text }}>{c.servicios && c.servicios.name || 'Servicio'}</p>
                            <span style={{ fontFamily: "'Bricolage Grotesque'", fontSize: 14, fontWeight: 600, color: G.text }}>{c.servicios && c.servicios.price ? c.servicios.price + '€' : '—'}</span>
                          </div>
                          <p style={{ fontSize: 12, color: G.muted, margin: 0 }}>
                            {c.barberos && c.barberos.name || '—'} · {c.date} · {c.time ? c.time.slice(0,5) : '—'}
                          </p>
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          );
        }

        // ─── VISTA 7: FIDELIZACIÓN Y PREMIOS (LOYALTY) ────────────────────────
        function LoyaltyScreen({ puntos }) {
          const rewards = [
            { pts: 500, title: "Corte Gratis", desc: "Un servicio de corte completo, gratis.", claim: puntos >= 500, bg: G.mint, fg: "#0F2A20" },

                    {r.claim ? "Canjear" : "Bloqueado"}

          function parseFecha(str) {
            var p = str.split('-');
            return new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
          }
          function fechaAStr(d) {
            return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
          }
          // Lunes de la semana de la fecha seleccionada
          function lunesDeSemana(d) {
            var copia = new Date(d);
            var dow = (copia.getDay() + 6) % 7; // 0 = lunes
            copia.setDate(copia.getDate() - dow);
            return copia;
          }

          var diasSemana = DIAS_SEMANA.map(function(_, i) {

            d.setDate(lunes.getDate() + i);
            return d;
          });
          function cambiarSemana(delta) {
            var nueva = new Date(fechaSel);
            nueva.setDate(nueva.getDate() + delta * 7);
            setSelectedDate(fechaAStr(nueva));
          }

          // Rango horario de la agenda (10–14 y 17–21). Construimos las filas hora a hora.
          var HORA_INI = 10, HORA_FIN = 21; // 21:00 incluido como línea final
          var PX_POR_HORA = 52;
          var horasTimeline = [];
          for (var hh = HORA_INI; hh <= HORA_FIN; hh++) horasTimeline.push(hh);

          // Posición vertical en px de una hora:minuto dentro del timeline
          function topDeHora(h, m) { return ((h - HORA_INI) * 60 + m) * (PX_POR_HORA / 60); }

          function colorEstado(c) { return estadoCita(c).color; }

            if (!m) return 'otro';
            var v = String(m).toLowerCase().trim();
            if (v.indexOf('efect') >= 0 || v === 'cash') return 'efectivo';
            if (v.indexOf('tarj') >= 0 || v === 'card') return 'tarjeta';
            if (v.indexOf('bizum') >= 0) return 'bizum';

          citasMes.forEach(function(c) {

            if (nowMin > citaMin + 30) return { label: 'Completada', color: G.green };
